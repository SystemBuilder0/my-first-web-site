name: Daily AI News Summary

on:
  schedule:
    # 23:00 UTC == 08:00 KST (다음 날)
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily AI news summary
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python daily_ai_news.py

      - name: Commit summary to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news/
          git diff --staged --quiet || git commit -m "Add AI news summary for $(date -u +%F)"
          git push
